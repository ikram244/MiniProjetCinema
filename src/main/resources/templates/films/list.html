<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Liste des Films</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; min-height: 100vh; }
        nav { background: #1a252f; padding: 14px 30px; display: flex; gap: 20px; }
        nav a { color: #ecf0f1; text-decoration: none; font-weight: 600; font-size: 0.95em; padding: 6px 12px; border-radius: 4px; transition: background 0.2s; }
        nav a:hover { background: #2c3e50; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { color: #2c3e50; font-size: 1.8em; }
        .btn-new { background: #8e44ad; color: white; padding: 9px 18px; border-radius: 5px; text-decoration: none; font-weight: 600; font-size: 0.9em; transition: background 0.2s; }
        .btn-new:hover { background: #6c3483; }

        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 12px 16px; border-radius: 5px; margin-bottom: 16px; }

        /* Filtres */
        .filters { background: white; padding: 16px 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 20px; display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
        .filters label { font-weight: 600; font-size: 0.88em; color: #555; display: flex; flex-direction: column; gap: 5px; }
        .filters select, .filters input { padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9em; }
        .btn-filter { background: #8e44ad; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.9em; }
        .btn-reset { color: #e74c3c; text-decoration: none; font-size: 0.9em; }

        /* Tableau */
        .table-wrap { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: #2c3e50; color: white; padding: 12px 14px; text-align: left; font-size: 0.88em; font-weight: 600; }
        tbody td { padding: 11px 14px; border-bottom: 1px solid #f0f0f0; font-size: 0.9em; color: #333; vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #f8fafc; }

        .badge-genre { background: #ede7f6; color: #6c3483; border-radius: 4px; padding: 3px 9px; font-size: 0.8em; font-weight: 600; }
        .duree { color: #888; font-size: 0.85em; }

        .actions { display: flex; gap: 6px; align-items: center; }
        .actions a, .actions button { font-size: 0.82em; padding: 4px 9px; border-radius: 4px; cursor: pointer; text-decoration: none; border: none; font-weight: 600; transition: opacity 0.15s; }
        .actions a:hover, .actions button:hover { opacity: 0.8; }
        .btn-edit   { background: #eaf3fb; color: #2980b9; }
        .btn-delete { background: #fde8e8; color: #c0392b; }
        .empty-row td { text-align: center; color: #aaa; padding: 30px; }
    </style>
</head>
<body>

<nav>
    <a href="/films">🎬 Films</a>
    <a href="/seances">🕐 Séances</a>
    <a href="/billets">🎟️ Billets</a>
</nav>

<div class="container">
    <div class="alert-success" th:if="${success}" th:text="${success}"></div>

    <div class="header-row">
        <h1>🎬 Films à l'affiche</h1>
        <a href="/films/nouveau" class="btn-new">+ Nouveau film</a>
    </div>

    <!-- Filtres -->
    <form class="filters" method="get" action="/films">
        <label>Genre :
            <select name="genre">
                <option value="">Tous</option>
                <option th:each="g : ${genres}" th:value="${g}" th:text="${g}"
                        th:selected="${g == genreSelectionne}"></option>
            </select>
        </label>
        <label>Titre :
            <input type="text" name="titre" th:value="${titreRecherche}" placeholder="Rechercher..."/>
        </label>
        <button type="submit" class="btn-filter">🔍 Filtrer</button>
        <a href="/films" class="btn-reset">✖ Réinitialiser</a>
    </form>

    <!-- Tableau -->
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>Titre</th>
                <th>Genre</th>
                <th>Durée</th>
                <th>Séances</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr class="empty-row" th:if="${#lists.isEmpty(films)}">
                <td colspan="6">Aucun film trouvé.</td>
            </tr>
            <tr th:each="film : ${films}">
                <td th:text="${film.id}"></td>
                <td><strong th:text="${film.titre}"></strong></td>
                <td><span class="badge-genre" th:text="${film.genre}"></span></td>
                <td><span class="duree" th:text="${film.dureeMin + ' min'}"></span></td>
                <td th:text="${film.seances != null ? #lists.size(film.seances) : 0}"></td>
                <td>
                    <div class="actions">
                        <a class="btn-edit" th:href="@{/films/{id}/modifier(id=${film.id})}">✏️ Modifier</a>
                        <!-- Suppression via POST -->
                        <form th:action="@{/films/{id}/supprimer(id=${film.id})}" method="post"
                              onsubmit="return confirm('Supprimer le film « ' + [[${film.titre}]] + ' » ?')">
                            <button type="submit" class="btn-delete">🗑️ Supprimer</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
