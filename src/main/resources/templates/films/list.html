<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Films à l'affiche</title>
    <style>
        :root {
            --bg:#0a0514; --card:rgba(30,20,50,0.85);
            --purple:#7b58ad; --purple-light:#9b6fd4; --purple-glow:rgba(123,88,173,0.3);
            --text:#e0e8f0; --muted:#8a7fa6; --border:rgba(123,88,173,0.2);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body {
            min-height:100vh; color:var(--text);
            background:url('https://img.freepik.com/photos-gratuite/collage-fond-film_23-2149876003.jpg') center/cover fixed;
        }
        body::before { content:''; position:fixed; inset:0; background:rgba(8,3,18,0.88); z-index:0; }
        nav, .container { position:relative; z-index:1; }

        nav {
            background:rgba(10,5,20,0.95); padding:1rem 5%;
            display:flex; justify-content:space-between; align-items:center;
            border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100;
            backdrop-filter:blur(10px); animation:slideDown .5s ease;
        }
        @keyframes slideDown { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
        @keyframes fadeUp    { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

        .logo { font-size:1.3rem; font-weight:700; color:var(--purple-light); letter-spacing:2px; }
        .nav-links { display:flex; gap:8px; }
        .nav-links a {
            color:var(--text); text-decoration:none; font-size:.9rem;
            padding:7px 14px; border-radius:8px; transition:all .2s;
        }
        .nav-links a:hover { background:rgba(123,88,173,.2); color:var(--purple-light); }

        .container { padding:2rem 5%; max-width:1400px; margin:0 auto; }

        .header-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; animation:fadeUp .5s ease; }
        h1 { font-size:1.8rem; text-transform:uppercase; letter-spacing:3px; }

        .filters {
            background:var(--card); padding:16px 20px; border-radius:14px;
            border:1px solid var(--border); margin-bottom:24px;
            display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap;
            backdrop-filter:blur(10px); animation:fadeUp .5s .1s ease both;
        }
        .filters label { font-weight:600; font-size:.85rem; color:var(--muted); display:flex; flex-direction:column; gap:5px; }
        .filters select, .filters input {
            padding:9px 14px; border:1px solid var(--border); border-radius:8px;
            font-size:.9rem; background:rgba(10,5,20,.8); color:var(--text);
        }
        .filters select:focus, .filters input:focus { outline:none; border-color:var(--purple); }

        /* Grille films */
        .movie-grid {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
            gap:24px;
        }

        .movie-card {
            background:var(--card); border-radius:16px; border:1px solid var(--border);
            overflow:hidden; backdrop-filter:blur(10px);
            transition:transform .3s,box-shadow .3s,border-color .3s;
            opacity:0; animation:fadeUp .6s ease forwards;
        }
        .movie-card:nth-child(1){animation-delay:.1s}
        .movie-card:nth-child(2){animation-delay:.2s}
        .movie-card:nth-child(3){animation-delay:.3s}
        .movie-card:nth-child(4){animation-delay:.4s}
        .movie-card:nth-child(5){animation-delay:.5s}
        .movie-card:nth-child(6){animation-delay:.6s}
        .movie-card:hover { transform:translateY(-8px); box-shadow:0 16px 40px rgba(0,0,0,.5); border-color:var(--purple); }

        /* Poster wrapper pour corbeille positionnée */
        .poster-wrap { position:relative; }
        .btn-supprimer-top {
            position:absolute; top:10px; right:10px;
            background:rgba(0,0,0,0.55); border:none; border-radius:50%;
            width:32px; height:32px; display:flex; align-items:center; justify-content:center;
            color:rgba(255,255,255,0.75); font-size:.95rem; cursor:pointer;
            transition:all .2s; backdrop-filter:blur(4px);
        }
        .btn-supprimer-top:hover { background:rgba(180,30,30,0.7); color:white; transform:scale(1.1); }

        .poster {
            width:100%; height:300px; object-fit:cover; display:block;
        }
        .poster-placeholder {
            width:100%; height:300px;
            background:linear-gradient(135deg,#1a0a2e,#2d1b4e);
            display:flex; align-items:center; justify-content:center; font-size:3rem;
        }

        .card-body { padding:16px; }
        .movie-title { font-size:1rem; font-weight:700; color:white; margin-bottom:10px; }

        .badges { display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
        .badge-genre {
            font-size:.72rem; padding:3px 10px; border-radius:6px;
            border:1px solid var(--border); color:var(--purple-light); font-weight:600;
        }
        .badge-duree {
            font-size:.72rem; padding:3px 10px; border-radius:6px;
            border:1px solid var(--border); color:var(--muted); font-weight:600;
        }
        .seances-count { font-size:.78rem; color:var(--muted); margin-bottom:14px; }

        .card-actions { display:flex; gap:8px; }

        /* ── NOUVEAU STYLE DES BOUTONS ── */
        .btn-modifier, .btn-edit, .btn-new, .btn-primary, .btn-filter, .btn-billet {
            background: linear-gradient(135deg, #6a35c8, #9b6fd4);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 7px 16px;
            font-size: .82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(123,88,173,0.5);
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-modifier:hover, .btn-edit:hover, .btn-new:hover, .btn-primary:hover, .btn-filter:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(123,88,173,0.7);
            filter: brightness(1.1);
        }
        .btn-supprimer, .btn-delete {
            background: linear-gradient(135deg, #8b1a1a, #c0392b);
            color: white; border: none; border-radius: 50px;
            padding: 7px 16px; font-size: .82rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s; box-shadow: 0 4px 20px rgba(192,57,43,0.4);
            width: 100%;
        }
        .btn-supprimer:hover, .btn-delete:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-cancel {
            background: linear-gradient(135deg, #7a4f00, #f39c12);
            color: white; border: none; border-radius: 50px;
            padding: 7px 16px; font-size: .82rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s;
        }
        .btn-confirm, .btn-billet {
            background: linear-gradient(135deg, #1a5c35, #27ae60);
            color: white; border: none; border-radius: 50px;
            padding: 7px 16px; font-size: .82rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s;
        }
        .btn-reset { color: #e74c3c; text-decoration: none; font-size: .9rem; border-radius: 50px; }

        .alert-success { background:rgba(13,43,26,.9); color:#6fcf97; border:1px solid #1a5c35; padding:12px 16px; border-radius:10px; margin-bottom:16px; }
        .empty-msg { text-align:center; color:var(--muted); padding:60px; animation:fadeUp .5s ease; }
    </style>
</head>
<body>

<nav>
    <div class="logo">🎬 CinéApp</div>
    <div class="nav-links">
        <a href="/films">Films</a>
        <a href="/seances">Séances</a>
        <a href="/billets">Billets</a>
    </div>
</nav>

<div class="container">
    <div class="alert-success" th:if="${success}" th:text="${success}"></div>

    <div class="header-row">
        <h1>À l'affiche</h1>
        <a href="/films/nouveau" class="btn-new">+ Nouveau film</a>
    </div>

    <form class="filters" method="get" action="/films">
        <label>Genre :
            <select name="genre">
                <option value="">Tous</option>
                <option th:each="g : ${genres}" th:value="${g}" th:text="${g}"
                        th:selected="${g == genreSelectionne}"></option>
            </select>
        </label>
        <label>Titre :
            <input type="text" name="titre" th:value="${titreRecherche}" placeholder="Rechercher..."/>
        </label>
        <button type="submit" class="btn-filter">Filtrer</button>
    </form>

    <div class="movie-grid" th:if="${not #lists.isEmpty(films)}">
        <div class="movie-card" th:each="film : ${films}">
            <!-- Poster + corbeille en haut à droite -->
            <div class="poster-wrap">
                <img th:if="${film.imageUrl != null and !film.imageUrl.isEmpty()}"
                     th:src="${film.imageUrl}" th:alt="${film.titre}" class="poster"/>
                <div th:unless="${film.imageUrl != null and !film.imageUrl.isEmpty()}"
                     class="poster-placeholder">🎬</div>
                <form th:action="@{/films/{id}/supprimer(id=${film.id})}" method="post" style="margin:0">
                    <button type="submit" class="btn-supprimer-top" title="Supprimer"
                            onclick="return confirm('Supprimer ce film ?')">🗑</button>
                </form>
            </div>

            <div class="card-body">
                <div class="movie-title" th:text="${film.titre}"></div>
                <div class="badges">
                    <span class="badge-genre" th:text="${film.genre}"></span>
                    <span class="badge-duree" th:text="${film.dureeMin + ' min'}"></span>
                </div>
                <div class="seances-count"
                     th:text="${(film.seances != null ? #lists.size(film.seances) : 0) + ' séance(s)'}">
                </div>
                <div class="card-actions">
                    <a class="btn-modifier" th:href="@{/films/{id}/modifier(id=${film.id})}">Modifier</a>
                </div>
            </div>
        </div>
    </div>

    <div class="empty-msg" th:if="${#lists.isEmpty(films)}">Aucun film trouvé.</div>
</div>
</body>
</html>
