<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Billets</title>
    <style>
        :root {
            --bg:#0a0514; --card:rgba(30,20,50,0.85); --card2:rgba(20,12,38,0.9);
            --purple:#7b58ad; --purple-light:#9b6fd4; --purple-glow:rgba(123,88,173,0.3);
            --text:#e0e8f0; --muted:#8a7fa6; --border:rgba(123,88,173,0.2);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body {
            min-height:100vh; color:var(--text);
            background:url('https://img.freepik.com/photos-gratuite/collage-fond-film_23-2149876003.jpg') center/cover fixed;
        }
        body::before { content:''; position:fixed; inset:0; background:rgba(8,3,18,0.88); z-index:0; }
        nav, .container { position:relative; z-index:1; }

        nav {
            background:rgba(10,5,20,0.95); padding:1rem 5%;
            display:flex; justify-content:space-between; align-items:center;
            border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100;
            backdrop-filter:blur(10px); animation:slideDown .5s ease;
        }
        @keyframes slideDown { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
        @keyframes fadeUp    { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

        .logo { font-size:1.3rem; font-weight:700; color:var(--purple-light); letter-spacing:2px; }
        .nav-links { display:flex; gap:8px; }
        .nav-links a { color:var(--text); text-decoration:none; font-size:.9rem; padding:7px 14px; border-radius:8px; transition:all .2s; }
        .nav-links a:hover { background:rgba(123,88,173,.2); color:var(--purple-light); }

        .container { padding:2rem 5%; max-width:1400px; margin:0 auto; }
        .header-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; animation:fadeUp .5s ease; }
        h1 { font-size:1.8rem; text-transform:uppercase; letter-spacing:3px; }

        .alert-success { background:rgba(13,43,26,.9); color:#6fcf97; border:1px solid #1a5c35; padding:12px 16px; border-radius:10px; margin-bottom:16px; }

        /* Stats top */
        .stats-top { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px; margin-bottom:24px; animation:fadeUp .5s .1s ease both; }
        .stat-card {
            background:var(--card); border-radius:14px; border:1px solid var(--border);
            padding:18px 20px; backdrop-filter:blur(10px);
            transition:transform .2s,box-shadow .2s;
        }
        .stat-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.4); }
        .stat-card .label { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }
        .stat-card .value { font-size:1.8rem; font-weight:700; margin-top:6px; }
        .val-green { color:#6fcf97; } .val-blue { color:var(--purple-light); }
        .val-orange { color:#f39c12; } .val-red { color:#e74c3c; }

        /* Donuts */
        .stats-donuts {
            background:var(--card); border-radius:14px; border:1px solid var(--border);
            padding:20px; margin-bottom:24px; backdrop-filter:blur(10px);
            display:flex; gap:30px; align-items:center; justify-content:center; flex-wrap:wrap;
            animation:fadeUp .5s .15s ease both;
        }
        .donuts-title { width:100%; font-size:.85rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
        .donut-item { display:flex; flex-direction:column; align-items:center; gap:8px; }
        .donut-wrap { position:relative; width:90px; height:90px; }
        .donut-wrap svg { transform:rotate(-90deg); }
        .donut-bg   { fill:none; stroke:rgba(123,88,173,.15); stroke-width:10; }
        .donut-fill { fill:none; stroke-width:10; stroke-linecap:round; transition:stroke-dasharray 1.2s ease; }
        .donut-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:1rem; font-weight:700; color:white; }
        .donut-label { font-size:.78rem; color:var(--muted); font-weight:600; }
        .donut-count { font-size:.85rem; font-weight:700; }

        /* Filtres */
        .filters {
            background:var(--card); padding:16px 20px; border-radius:14px;
            border:1px solid var(--border); margin-bottom:24px;
            display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap;
            backdrop-filter:blur(10px); animation:fadeUp .5s .2s ease both;
        }
        .filters label { font-weight:600; font-size:.85rem; color:var(--muted); display:flex; flex-direction:column; gap:5px; }
        .filters select { padding:9px 14px; border:1px solid var(--border); border-radius:8px; font-size:.9rem; background:rgba(10,5,20,.8); color:var(--text); }
        .filters select:focus { outline:none; border-color:var(--purple); }

        /* Tableau */
        .table-wrap {
            background:var(--card); border-radius:16px; border:1px solid var(--border);
            overflow:hidden; backdrop-filter:blur(10px);
            animation:fadeUp .5s .3s ease both;
        }
        table { width:100%; border-collapse:collapse; }
        thead th {
            background:var(--card2); color:var(--muted);
            padding:14px 16px; text-align:left;
            font-size:.78rem; font-weight:700;
            text-transform:uppercase; letter-spacing:.8px;
            border-bottom:1px solid var(--border);
        }
        tbody td { padding:14px 16px; border-bottom:1px solid var(--border); font-size:.9rem; vertical-align:middle; }
        tbody tr:last-child td { border-bottom:none; }
        tbody tr { transition:background .2s; }
        tbody tr:hover { background:rgba(123,88,173,.05); }

        .badge { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
        .badge-vendu  { color:#6fcf97; }
        .badge-annule { color:#e74c3c; }
        .badge-reserve{ color:#f39c12; }

        .prix-cell { font-weight:700; color:#9b6fd4; }

        .actions { display:flex; gap:6px; align-items:center; flex-wrap:nowrap; }

        /* ── BOUTONS HEADER / FILTRE ── */
        .btn-new {
            background: linear-gradient(135deg, #6a35c8, #9b6fd4);
            color: white; border: none; border-radius: 50px;
            padding: 7px 16px; font-size: .82rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(123,88,173,0.5);
            text-decoration: none; display: inline-block; text-align: center;
        }
        .btn-new:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(123,88,173,0.7); filter: brightness(1.1); }
        .btn-filter {
            background: linear-gradient(135deg, #6a35c8, #9b6fd4);
            color: white; border: none; border-radius: 50px;
            padding: 7px 16px; font-size: .82rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(123,88,173,0.5);
        }
        .btn-filter:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-reset { color: #e74c3c; text-decoration: none; font-size: .9rem; }

        /* ── ICÔNES ACTIONS (sans fond, sans bordure) ── */
        .btn-edit, .btn-cancel, .btn-confirm, .btn-delete {
            background: none; border: none; cursor: pointer;
            padding: 4px 6px; font-size: 1rem; line-height: 1;
            transition: opacity .2s, transform .2s;
            text-decoration: none; display: inline-flex; align-items: center;
        }
        .btn-edit    { color: var(--purple-light); }
        .btn-cancel  { color: #f39c12; }
        .btn-confirm { color: #6fcf97; }
        .btn-delete  { color: #e74c3c; }
        .btn-edit:hover, .btn-cancel:hover, .btn-confirm:hover, .btn-delete:hover {
            opacity: .7; transform: scale(1.2);
        }

        .empty-row td { text-align:center; color:var(--muted); padding:50px; }
    </style>
</head>
<body>
<nav>
    <div class="logo">🎬 CinéApp</div>
    <div class="nav-links">
        <a href="/films">Films</a>
        <a href="/seances">Séances</a>
        <a href="/billets">Billets</a>
    </div>
</nav>

<div class="container">
    <div class="alert-success" th:if="${success}" th:text="${success}"></div>
    <div class="header-row">
        <h1>Billets</h1>
        <a href="/billets/nouveau" class="btn-new">+</a>
    </div>

    <div class="stats-top">
        <div class="stat-card">
            <div class="label">Total recettes</div>
            <div class="value val-green" th:text="${#numbers.formatDecimal(totalRecettes,1,2) + ' DH'}">0 DH</div>
        </div>
        <div class="stat-card" th:each="entry : ${repartition}">
            <div class="label" th:text="${entry.key}"></div>
            <div th:class="${entry.key=='VENDU'} ? 'value val-green' : (${entry.key=='ANNULE'} ? 'value val-red' : 'value val-orange')"
                 th:text="${entry.value}"></div>
        </div>
    </div>

    <div class="stats-donuts" th:if="${not #maps.isEmpty(repartition)}">
        <div class="donuts-title">Répartition des billets</div>
        <div class="donut-item" th:each="entry : ${repartition}">
            <div class="donut-wrap">
                <svg width="90" height="90" viewBox="0 0 90 90">
                    <circle class="donut-bg" cx="45" cy="45" r="35"/>
                    <circle class="donut-fill" cx="45" cy="45" r="35"
                            th:attr="stroke=${entry.key=='VENDU'} ? '#27ae60' : (${entry.key=='ANNULE'} ? '#e74c3c' : '#f39c12'),
                                     data-val=${entry.value},
                                     data-total=${#lists.size(billets)}"
                            style="stroke-dasharray:0 220"/>
                </svg>
                <div class="donut-text" th:text="${entry.value}"></div>
            </div>
            <div class="donut-label" th:text="${entry.key}"></div>
            <div class="donut-count"
                 th:style="${entry.key=='VENDU'} ? 'color:#6fcf97' : (${entry.key=='ANNULE'} ? 'color:#e74c3c' : 'color:#f39c12')"
                 th:text="${#lists.size(billets) > 0 ? #numbers.formatDecimal(entry.value * 100.0 / #lists.size(billets),1,0) + '%' : '0%'}">
            </div>
        </div>
    </div>

    <form class="filters" method="get" action="/billets">
        <label>Statut :
            <select name="statut">
                <option value="">Tous</option>
                <option th:each="s : ${statuts}" th:value="${s}" th:text="${s}" th:selected="${s == statutSelectionne}"></option>
            </select>
        </label>
        <button type="submit" class="btn-filter">Filtrer</button>

    </form>

    <div class="table-wrap">
        <table>
            <thead>
            <tr><th>#</th><th>Film</th><th>Séance</th><th>Prix</th><th>Statut</th><th>Date achat</th><th>Actions</th></tr>
            </thead>
            <tbody>
            <tr class="empty-row" th:if="${#lists.isEmpty(billets)}">
                <td colspan="7">Aucun billet trouvé.</td>
            </tr>
            <tr th:each="billet : ${billets}">
                <td th:text="${billet.id}"></td>
                <td><strong th:text="${billet.seance.film.titre}"></strong></td>
                <td th:text="${billet.seance.salle + ' — ' + #temporals.format(billet.seance.dateHeure,'dd/MM HH:mm')}"></td>
                <td class="prix-cell" th:text="${#numbers.formatDecimal(billet.prix,1,2) + ' DH'}"></td>
                <td>
                    <span th:class="${billet.statut=='VENDU'} ? 'badge badge-vendu' :
                                   (${billet.statut=='ANNULE'} ? 'badge badge-annule' : 'badge badge-reserve')"
                          th:text="${billet.statut}"></span>
                </td>
                <td th:text="${billet.dateAchat != null ? #temporals.format(billet.dateAchat,'dd/MM/yyyy') : '-'}"></td>
                <td>
                    <div class="actions">
                        <a class="btn-edit" th:href="@{/billets/{id}/modifier(id=${billet.id})}" title="Modifier">✎</a>
                        <form th:if="${billet.statut=='VENDU' or billet.statut=='RESERVE'}"
                              th:action="@{/billets/{id}/annuler(id=${billet.id})}" method="post"
                              onsubmit="return confirm('Annuler ce billet ?')">
                            <button type="submit" class="btn-cancel" title="Annuler">✕</button>
                        </form>
                        <form th:if="${billet.statut=='RESERVE' or billet.statut=='ANNULE'}"
                              th:action="@{/billets/{id}/confirmer(id=${billet.id})}" method="post">
                            <button type="submit" class="btn-confirm" title="Confirmer">✔</button>
                        </form>
                        <form th:action="@{/billets/{id}/supprimer(id=${billet.id})}" method="post"
                              onsubmit="return confirm('Supprimer ce billet ?')">
                            <button type="submit" class="btn-delete" title="Supprimer">⊘</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    setTimeout(() => {
        const circ = 2 * Math.PI * 35;
        document.querySelectorAll('.donut-fill').forEach(c => {
            const v = parseInt(c.dataset.val) || 0;
            const t = parseInt(c.dataset.total) || 1;
            const d = Math.min(v/t,1) * circ;
            c.style.strokeDasharray = d + ' ' + (circ - d);
        });
    }, 500);
</script>
</body>
</html>
