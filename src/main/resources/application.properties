# =============================================
# Configuration Application Cinéma
# =============================================

spring.application.name=cinemaapp

# Base de données H2 (en mémoire)
spring.datasource.url=jdbc:h2:mem:cinemadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# IMPORTANT : permet à data.sql de s'exécuter après la création des tables par Hibernate
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Console H2 (accessible via http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Port serveur
server.port=8080